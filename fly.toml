app = "buconfess"
primary_region = "sin"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/prod.db"

[[mounts]]
  source = "buconfess_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
